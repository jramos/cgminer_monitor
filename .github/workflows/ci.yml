name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  lint:
    name: RuboCop
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop

  audit:
    name: bundle-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run bundle-audit
        run: bundle exec bundle-audit check --update

  test:
    name: Ruby ${{ matrix.ruby }} / Mongo ${{ matrix.mongo }}
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.2'
          - '3.3'
          - '3.4'
        mongo:
          - '7'
        include:
          - ruby: '3.4'
            mongo: '6'
          - ruby: '4.0'
            mongo: '7'
            experimental: true
          - ruby: head
            mongo: '7'
            experimental: true

    services:
      mongo:
        image: mongo:${{ matrix.mongo }}
        ports:
          - 27017:27017

    env:
      CGMINER_MONITOR_MONGO_URL: mongodb://localhost:27017/cgminer_monitor_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rspec --exclude-pattern 'spec/integration/**/*_spec.rb'

  integration:
    name: Integration / Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.4'

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      CGMINER_MONITOR_MONGO_URL: mongodb://localhost:27017/cgminer_monitor_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run integration tests
        run: bundle exec rspec spec/integration/ -fd

  openapi-check:
    name: OpenAPI consistency
    runs-on: ubuntu-24.04

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      CGMINER_MONITOR_MONGO_URL: mongodb://localhost:27017/cgminer_monitor_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Check OpenAPI consistency
        run: bundle exec rspec spec/openapi_consistency_spec.rb -fd
