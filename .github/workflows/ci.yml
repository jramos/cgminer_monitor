name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} / Mongo ${{ matrix.mongo }}
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.2'
          - '3.3'
          - '3.4'
        mongo:
          - '7'
        include:
          - ruby: '3.4'
            mongo: '6'
          - ruby: '4.0'
            mongo: '7'
            experimental: true
          - ruby: head
            mongo: '7'
            experimental: true

    services:
      mongo:
        image: mongo:${{ matrix.mongo }}
        ports:
          - 27017:27017

    env:
      CGMINER_MONITOR_MONGO_URL: mongodb://localhost:27017/cgminer_monitor_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests and lint
        run: bundle exec rake
