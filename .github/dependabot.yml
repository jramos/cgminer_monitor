version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    versioning-strategy: lockfile-only
    labels:
      - dependencies
      - ruby

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
